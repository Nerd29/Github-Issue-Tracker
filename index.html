<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Issue-Tracker</title>

    <!-- DaisyUI+Tailwind added -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <style>
        *{
            font-family: "Geist", sans-serif;
        }
    </style>
</head>
<body>

    <!-- <div class="w=11/12 mx-auto items-center"> -->
        <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-md mx-auto p-6 mt-[50px]">
            <fieldset class="fieldset ">
        <!-- <legend class="fieldset-legend text-center"> -->
        <div class="flex flex-col items-center mb-6">
            <div class=" pb-[24px]">
            <img src="./assets/github-logo.png" alt="">

        </div>
        <!-- <div class="text-center"> -->
            <h2 class="font-semibold text-[24px] text-[#1F2937]">GitHub Issues Tracker</h2>
            <p class="text-[16px] text-[#64748B]">Sign in to manage your issues</p>
        </div>
            
        <!-- </div> -->
        <!-- </legend> -->

        <label class="label text-[16px] text-[#1F2937]">Username</label>
        <input id="username-btn" type="text" class="input" placeholder="Enter Username" />
        <p class="text-[14px] text-[#4A00FF]">Default:admin</p>

        <label class="label mt-4 text-[16px] text-[#1F2937] ">Password</label>
        <input id="password-btn" type="password" class="input" placeholder="Enter Password" />
        <p class="text-[14px] text-[#4A00FF]">Default:admin123</p>


        <button id="signin-btn" class="btn btn-primary mt-4 rounded-full">Sign in</button>
        </fieldset>
        </div>
        
    </div>


    <script src="login.js"></script>
</body>
</html>
